<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>User Profile</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="styles/variables.css">
    <link rel="stylesheet" href="styles/global.css">
    <style>
        /* Cover & Profile Header */
        .profile-cover {
            height: 150px;
            background: linear-gradient(135deg, var(--primary-500), var(--primary-700));
            border-bottom-left-radius: var(--radius-xl);
            border-bottom-right-radius: var(--radius-xl);
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 0;
        }

        .profile-header {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 80px;
            /* Overlap cover */
            margin-bottom: var(--space-xl);
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: var(--radius-full);
            border: 4px solid var(--surface);
            background: white;
            box-shadow: var(--shadow-level-2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: var(--primary-500);
            font-weight: bold;
            margin-bottom: var(--space-md);
            position: relative;
        }

        .edit-avatar-btn {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 32px;
            height: 32px;
            border-radius: var(--radius-full);
            background: var(--surface);
            color: var(--primary-500);
            border: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow-level-1);
        }

        .profile-info {
            text-align: center;
        }

        .employee-id {
            display: inline-block;
            background: rgba(74, 144, 226, 0.1);
            color: var(--primary-500);
            padding: 4px 12px;
            border-radius: var(--radius-full);
            font-family: monospace;
            font-weight: 600;
            margin-top: var(--space-xs);
        }

        /* Settings List */
        .settings-group {
            background: var(--surface);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-subtle);
            margin-bottom: var(--space-xl);
            overflow: hidden;
            box-shadow: var(--shadow-level-1);
        }

        .settings-item {
            display: flex;
            align-items: center;
            padding: var(--space-md);
            border-bottom: 1px solid var(--divider);
            color: var(--text-primary);
            text-decoration: none;
            transition: background var(--trans-fast);
        }

        .settings-item:last-child {
            border-bottom: none;
        }

        .settings-item:active {
            background: var(--bg-secondary);
        }

        .settings-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--text-secondary);
            margin-right: var(--space-md);
        }

        .settings-content {
            flex: 1;
        }

        /* Toggle Switch */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--border-subtle);
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--primary-500);
        }

        input:checked+.slider:before {
            transform: translateX(24px);
        }

        /* Logout */
        .logout-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: var(--space-md);
            background: transparent;
            border: 1px solid var(--error-500);
            color: var(--error-500);
            border-radius: var(--radius-md);
            font-size: var(--body-large);
            font-weight: 600;
            gap: var(--space-sm);
        }

        .logout-btn:active {
            background: rgba(239, 83, 80, 0.1);
        }

        .app-version {
            margin-top: var(--space-xl);
            text-align: center;
            color: var(--text-tertiary);
        }
    </style>
</head>

<body>
    <div class="profile-cover"></div>

    <div class="app-content">
        <!-- Profile Header -->
        <div class="profile-header">
            <div class="profile-avatar">
                JD
                <div class="edit-avatar-btn"><i class="ph ph-camera"></i></div>
            </div>
            <div class="profile-info">
                <h1 class="display-sm mb-xs">John Doe</h1>
                <p class="body-lg text-secondary">Senior Software Engineer</p>
                <div class="employee-id">EMP-00142</div>
            </div>
        </div>

        <!-- Settings Groups -->
        <h3 class="label-lg text-tertiary mb-sm" style="margin-top: var(--space-md);">Account Detail</h3>
        <div class="settings-group">
            <a href="#" class="settings-item">
                <div class="settings-icon"><i class="ph ph-user"></i></div>
                <div class="settings-content">
                    <div class="title-sm">Personal Information</div>
                    <div class="body-sm text-secondary">Edit email, phone number</div>
                </div>
                <i class="ph ph-caret-right text-tertiary"></i>
            </a>
            <a href="#" class="settings-item">
                <div class="settings-icon"><i class="ph ph-lock-key"></i></div>
                <div class="settings-content">
                    <div class="title-sm">Security & Password</div>
                    <div class="body-sm text-secondary">Change password, 2FA</div>
                </div>
                <i class="ph ph-caret-right text-tertiary"></i>
            </a>
            <a href="#" class="settings-item">
                <div class="settings-icon"><i class="ph ph-files"></i></div>
                <div class="settings-content">
                    <div class="title-sm">Documents</div>
                    <div class="body-sm text-secondary">Contracts, Payslips</div>
                </div>
                <i class="ph ph-caret-right text-tertiary"></i>
            </a>
        </div>

        <h3 class="label-lg text-tertiary mb-sm">App Preferences</h3>
        <div class="settings-group">
            <div class="settings-item">
                <div class="settings-icon"><i class="ph ph-bell"></i></div>
                <div class="settings-content">
                    <div class="title-sm">Push Notifications</div>
                </div>
                <label class="toggle-switch">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                </label>
            </div>
            <div class="settings-item">
                <div class="settings-icon"><i class="ph ph-moon"></i></div>
                <div class="settings-content">
                    <div class="title-sm">Dark Mode</div>
                </div>
                <!-- Normally this would be JS connected, for pure prototype layout -->
                <label class="toggle-switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <!-- Logout -->
        <button class="logout-btn" onclick="window.location.href='index.html'">
            <i class="ph ph-sign-out" style="font-size: 24px;"></i> Log Out
        </button>

        <p class="app-version label-med">HR App Proxy v1.0.0-prototype</p>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <i class="ph ph-house"></i>
            <span>Home</span>
        </a>
        <a href="attendance.html" class="nav-item">
            <i class="ph ph-clock-user"></i>
            <span>Attend</span>
        </a>
        <a href="leave.html" class="nav-item">
            <i class="ph ph-airplane-tilt"></i>
            <span>Leave</span>
        </a>
        <a href="announcements.html" class="nav-item">
            <i class="ph ph-megaphone"></i>
            <span>News</span>
        </a>
        <a href="profile.html" class="nav-item active">
            <i class="ph-fill ph-user"></i>
            <span>Profile</span>
        </a>
    </nav>
</body>

</html>
